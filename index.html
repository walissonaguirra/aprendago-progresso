  <div class="flex flex-1 min-h-0">
    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 bg-white border-r border-gray-200 flex flex-col shrink-0" aria-label="Navegação lateral">
      <div class="px-5 py-4 border-b border-gray-200 shrink-0">
        <div class="flex justify-between text-xs text-gray-500 mb-2">
          <span>Progresso geral</span>
          <span id="sidebar-progress">0/0 (0%)</span>
        </div>
        <div class="h-1.5 bg-gray-200 rounded overflow-hidden" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="Progresso geral" id="sidebar-progressbar">
          <div id="sidebar-bar" class="h-full bg-go-blue rounded transition-all duration-300" style="width:0%"></div>
        </div>
      </div>

      <nav id="sidebar-nav" class="flex-1 overflow-y-auto py-3" aria-label="Capítulos"></nav>
    </aside>

    <!-- Main -->
    <main class="flex-1 overflow-y-auto">
      <div id="main" class="max-w-4xl mx-auto px-10 py-8"></div>
    </main>
  </div>

  <footer class="w-full border-t border-gray-200 bg-white px-5 py-2 flex items-center justify-end shrink-0">
    <button type="button" id="welcome-trigger"
            class="text-xs text-gray-500 hover:text-go-primary hover:underline transition-colors">
      Boas-vindas
    </button>
  </footer>

  <div id="welcome-root" class="hidden"></div>

  <script type="module" src="./js/app.js"></script>

</html>
